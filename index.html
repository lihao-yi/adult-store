<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="臻选私享馆 - 私密高端成人用品展示">
    <title>臻选私享馆</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- 年龄验证弹窗（出生日期） -->
    <div class="age-gate" id="ageGate">
        <div class="age-gate-card">
            <div class="age-gate-divider"></div>
            <h2 class="age-gate-title"><i class="fa-solid fa-lock age-gate-icon"></i> 年龄认证</h2>
            <p class="age-gate-desc">本网站展示成人私密用品，仅限 <strong>18 周岁以上</strong> 人士浏览。</p>
            <div class="age-gate-disclaimer">
                <p><i class="fa-solid fa-circle-exclamation"></i> <strong>免责声明</strong></p>
                <p>本站所有商品仅供个人私密使用，请合法、合规、理性对待。未满 18 岁者请立即离开。继续浏览即代表您已阅读并接受本声明。</p>
            </div>
            <div class="birth-form">
                <p class="birth-label">请输入您的出生日期：</p>
                <div class="birth-selects">
                    <select id="birthYear" aria-label="年"></select>
                    <span class="birth-sep">年</span>
                    <select id="birthMonth" aria-label="月"></select>
                    <span class="birth-sep">月</span>
                    <select id="birthDay" aria-label="日"></select>
                    <span class="birth-sep">日</span>
                </div>
                <button class="age-btn age-btn-verify" id="ageVerifyBtn">
                    <i class="fa-solid fa-check"></i> 验证年龄
                </button>
                <p class="age-error" id="ageError"></p>
            </div>
            <div class="age-gate-divider"></div>
        </div>
    </div>

    <!-- 导航 -->
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo"><i class="fa-solid fa-gem"></i><span>臻选私享馆</span></a>
            <nav class="header-nav">
                <a href="index.html" class="nav-link active">精选好物</a>
                <a href="contact.html" class="nav-link nav-link-contact"><i class="fa-solid fa-comment-dots"></i> 联系顾问</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="page-hero">
            <div class="hero-divider"></div>
            <h1 class="hero-title"><i class="fa-solid fa-crown hero-icon"></i> 臻选私享</h1>
            <p class="hero-subtitle">品质之选 · 私密包装 · 专属顾问一对一服务</p>
            <div class="hero-divider"></div>
        </section>

        <!-- 非贩卖提醒 -->
        <div class="notice-bar">
            <i class="fa-solid fa-circle-info"></i>
            <span>温馨提示：本网站仅为商品展示，非贩卖网站，如需购买请微信联系主理人。</span>
        </div>

        <!-- 两级分类筛选 -->
        <section class="filter-section">
            <div class="filter-bar" id="mainFilterBar">
                <button class="filter-btn active" data-main="全部">全部主类</button>
            </div>
            <div class="filter-bar filter-sub-bar" id="subFilterBar" style="display:none;">
                <button class="filter-btn active" data-sub="全部">全部小类</button>
            </div>
        </section>

        <section class="product-grid" id="productGrid"></section>
    </main>

    <footer class="site-footer">
        <div class="footer-divider"></div>
        <p class="footer-text">© 2026 臻选私享馆 · 隐私发货 · 保密包装</p>
        <a href="contact.html" class="footer-cta"><i class="fa-solid fa-arrow-right"></i> 联系客服获取更多密选好物</a>
    </footer>

    <!-- 图片灯箱 -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <img src="" alt="" id="lightboxImg">
    </div>

    <script src="js/main.js"></script>
</body>
</html>
